<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo — Ateliê Verdanza</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles-global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --warm-white: #faf7f2;
      --dark-green: #1e2c1a;
      --mid-green: #3a5435;
      --light-green: #6b8f5e;
      --text-dark: #2a2a22;
      --text-mid: #5a5a4a;
      --text-light: #8a8a7a;
      --border: #d8d0c0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--warm-white);
      color: var(--text-dark);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 60px;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text-dark);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--text-mid);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
      padding-bottom: 4px;
    }

    .nav-links a:hover { color: var(--dark-green); }
    .nav-links a.active {
      color: var(--text-dark);
      border-bottom: 1.5px solid var(--text-dark);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-icon {
      position: relative;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .nav-icon:hover { color: var(--dark-green); }

    /* ── SEARCH BAR ── */
    .search-bar-wrapper {
      padding: 32px 48px 0;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 20px;
      max-width: 520px;
      margin: 0 auto;
    }

    .search-bar svg { color: var(--text-light); flex-shrink: 0; }

    .search-bar input {
      border: none;
      background: transparent;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--text-dark);
      outline: none;
      width: 100%;
    }

    .search-bar input::placeholder { color: var(--text-light); }

    /* ── LAYOUT ── */
    .catalog-layout {
      display: flex;
      flex: 1;
      padding: 32px 48px 48px;
      gap: 40px;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 160px;
      flex-shrink: 0;
      order: 2;
    }

    .sidebar h4 {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 14px;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .category-item {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .category-item input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }

    .category-item input[type="checkbox"]:checked {
      background: var(--dark-green);
      border-color: var(--dark-green);
    }

    .category-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .category-item label {
      font-size: 0.82rem;
      color: var(--text-mid);
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
    }

    /* ── GRID ── */
    .products-section {
      flex: 1;
      order: 1;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 28px 24px;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      cursor: pointer;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .product-card:nth-child(1) { animation-delay: 0.05s; }
    .product-card:nth-child(2) { animation-delay: 0.10s; }
    .product-card:nth-child(3) { animation-delay: 0.15s; }
    .product-card:nth-child(4) { animation-delay: 0.20s; }
    .product-card:nth-child(5) { animation-delay: 0.25s; }
    .product-card:nth-child(6) { animation-delay: 0.30s; }
    .product-card:nth-child(7) { animation-delay: 0.35s; }
    .product-card:nth-child(8) { animation-delay: 0.40s; }
    .product-card:nth-child(9) { animation-delay: 0.45s; }

    .product-card-img {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      background: var(--cream);
    }

    .product-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-card:hover .product-card-img img {
      transform: scale(1.05);
    }

    .add-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--dark-green);
      color: #fff;
      border: none;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .add-btn:hover {
      background: var(--mid-green);
      transform: scale(1.1);
    }

    .product-info {
      margin-top: auto;
      padding-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
    }

    .product-name {
      font-size: 1.125rem;
      color: var(--text-dark);
      line-height: 1.3;
      font-weight: 500;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.6em;
    }

    .product-price {
      font-size: 1.25rem;
      color: var(--text-mid);
      white-space: nowrap;
    }

    /* ── NO RESULTS ── */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--text-light);
      font-size: 0.88rem;
    }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 48px 0 0;
    }

    .page-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-mid);
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .page-btn:hover {
      border-color: var(--dark-green);
      color: var(--dark-green);
    }

    .page-btn.active {
      background: var(--dark-green);
      border-color: var(--dark-green);
      color: #fff;
    }

    .page-btn.arrow {
      color: var(--text-light);
      font-size: 1rem;
    }

    .page-btn.arrow:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--cream);
      border-top: 1px solid var(--border);
      padding: 48px 48px 24px;
    }

    .footer-top {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr 1.4fr;
      gap: 32px;
      margin-bottom: 40px;
    }

    .footer-brand h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .footer-brand p {
      font-size: 0.77rem;
      color: var(--text-light);
      line-height: 1.7;
    }

    .footer-col h4 {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dark);
      margin-bottom: 14px;
    }

    .footer-col ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-col ul li a {
      font-size: 0.8rem;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-col ul li a:hover { color: var(--text-dark); }

    /* newsletter */
    .newsletter-form {
      display: flex;
      gap: 0;
      margin-top: 4px;
    }

    .newsletter-form p {
      font-size: 0.77rem;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .newsletter-input {
      flex: 1;
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 4px 0 0 4px;
      padding: 10px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 2rem;
      background: #fff;
      color: var(--text-dark);
      outline: none;
    }

    .newsletter-input:focus { border-color: var(--dark-green); }

    .newsletter-btn {
      padding: 10px 16px;
      background: var(--dark-green);
      color: #fff;
      border: none;
      border-radius: 0 4px 4px 0;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .newsletter-btn:hover { background: var(--mid-green); }

    .footer-bottom {
      border-top: 1px solid var(--border);
      padding-top: 20px;
      text-align: center;
    }

    .footer-bottom p {
      font-size: 0.7rem;
      color: var(--text-light);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--dark-green);
      color: #fff;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 0.82rem;
      opacity: 0;
      transform: translateY(16px);
      transition: all 0.3s ease;
      z-index: 999;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 0 20px; }
      .search-bar-wrapper { padding: 24px 20px 0; }
      .catalog-layout { flex-direction: column; padding: 24px 20px 40px; }
      .sidebar { width: 100%; order: 1; }
      .category-list { flex-direction: row; flex-wrap: wrap; gap: 12px 20px; }
      .products-section { order: 2; }
      .product-grid { grid-template-columns: repeat(2, 1fr); }
      footer { padding: 40px 20px 20px; }
      .footer-top { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 520px) {
      .product-grid { grid-template-columns: 1fr; }
      .footer-top { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav></nav>

<!-- SEARCH -->
<div class="search-bar-wrapper">
  <div class="search-bar">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search our conservatory..." oninput="filterProducts()" />
  </div>
</div>

<!-- MAIN -->
<div class="catalog-layout">

  <!-- GRID -->
  <section class="products-section">
    <div class="product-grid" id="product-grid">
      <!-- filled by JS -->
    </div>
    <div class="pagination" id="pagination"></div>
  </section>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h4>Categories</h4>
    <div class="category-list">
      <label class="category-item">
        <input type="checkbox" value="Plantas" checked onchange="filterProducts()" />
        <span>Plantas</span>
      </label>
      <label class="category-item">
        <input type="checkbox" value="Flores" checked onchange="filterProducts()" />
        <span>Flores</span>
      </label>
    </div>
  </aside>
</div>

<!-- FOOTER -->
<footer></footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- COMPONENTES GLOBAIS -->
<script src="components.js"></script>
<script src="js/api.js"></script>

<script>
  const PER_PAGE = 12;

  let currentPage = 1;
  let allProducts = [];
  let filtered = [];

  function formatPrice(price) {
    return Number(price).toLocaleString('pt-BR', {
      style: 'currency',
      currency: 'BRL'
    });
  }
//chama a api de produtos
  async function loadProducts() {
    try {
      // serve para buscar produtos na rota:
      const data = await apiRequest("/products"); 

      allProducts = data.map(product => ({
        id: product.id,
        name: product.name,
        price: Number(product.price),
        category: product.category,
        img: product.image
      }));

      filtered = [...allProducts];

      filterProducts();

    } catch (error) {
      console.error(error);
      alert("Erro ao carregar produtos.");
    }
  }

  // verifica quais categorias estão marcadas no filtro lateral.
  function getActiveCategories() {
    return [...document.querySelectorAll('.category-list input:checked')]
      .map(cb => cb.value);
  }
// filtra os produtos por categoria e texto digitado
  function filterProducts() {
    const cats = getActiveCategories();

    const query = document
      .getElementById('search-input')
      .value
      .toLowerCase()
      .trim();

    filtered = allProducts.filter(p => {
      const catMatch =
        cats.length === 0 || cats.includes(p.category);

      const textMatch =
        !query || p.name.toLowerCase().includes(query);

      return catMatch && textMatch;
    });

    currentPage = 1;

    render();
  }

  // desenha os cards
  function render() {
    const grid = document.getElementById('product-grid');

    const start = (currentPage - 1) * PER_PAGE;

    const page = filtered.slice(start, start + PER_PAGE);

    if (page.length === 0) {
      grid.innerHTML =
        '<p class="no-results">Nenhum produto encontrado.</p>';

    } else {

      grid.innerHTML = page.map((p, i) => `
        <div class="product-card"
             style="animation-delay:${i * 0.06}s"
             onclick="openProduct(${p.id})">

          <div class="product-card-img">
            <img src="${p.img}"
                 alt="${p.name}"
                 loading="lazy" />

            <button class="add-btn"
                    onclick="addToCart(event, ${p.id})">
              +
            </button>
          </div>

          <div class="product-info">
            <span class="product-name">${p.name}</span>
            <span class="product-price">${formatPrice(p.price)}</span>          </div>
        </div>
      `).join('');
    }

    renderPagination();
  }

  //Essa função cria os botões da paginação.
  function renderPagination() {
    const total = Math.ceil(filtered.length / PER_PAGE);

    const pg = document.getElementById('pagination');

    if (total <= 1) {
      pg.innerHTML = '';
      return;
    }

    let html = `
      <button class="page-btn arrow"
              onclick="goPage(${currentPage - 1})"
              ${currentPage === 1 ? 'disabled' : ''}>
        ‹
      </button>
    `;

    for (let i = 1; i <= total; i++) {
      html += `
        <button class="page-btn ${i === currentPage ? 'active' : ''}"
                onclick="goPage(${i})">
          ${i}
        </button>
      `;
    }

    html += `
      <button class="page-btn arrow"
              onclick="goPage(${currentPage + 1})"
              ${currentPage === total ? 'disabled' : ''}>
        ›
      </button>
    `;

    pg.innerHTML = html;
  }

  // Essa função muda de página.
  function goPage(n) {
    const total = Math.ceil(filtered.length / PER_PAGE);

    if (n < 1 || n > total) return;

    currentPage = n;

    render();

    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });
  }

  function openProduct(id) {
    window.location.href = `produto.html?id=${id}`;
  }

  function addToCart(event, id) {
    event.stopPropagation();

    const produto = allProducts.find(p => String(p.id) === String(id));

    if (!produto) {
      alert('Produto não encontrado.');
      return;
    }

    const cart = JSON.parse(localStorage.getItem('cart')) || [];

    const existingItem = cart.find(item => String(item.id) === String(produto.id));

    if (existingItem) {
      existingItem.quantity = Number(existingItem.quantity || 1) + 1;
    } else {
      cart.push({
        id: produto.id,
        name: produto.name || 'Produto sem nome',
        category: produto.category || '—',
        price: Number(produto.price || 0),
        img: produto.img || '',
        quantity: 1
      });
    }

    localStorage.setItem('cart', JSON.stringify(cart));

    if (typeof updateCartCount === 'function') {
      updateCartCount();
    }

    if (typeof showToast === 'function') {
      showToast('Produto adicionado ao carrinho!');
    } else {
      alert('Produto adicionado ao carrinho!');
    }
  }


function subscribeNewsletter(btn) {
    const input = btn.previousElementSibling;

    if (!input.value.includes('@')) {
      input.style.borderColor = '#c0392b';
      return;
    }

    input.style.borderColor = '';

    btn.textContent = '✓';

    btn.style.background = '#3a7d44';

    setTimeout(() => {
      btn.textContent = 'Join';
      btn.style.background = '';
    }, 3000);
  }

  // INICIAR CATÁLOGO
  loadProducts();
</script>
</body>
</html>
