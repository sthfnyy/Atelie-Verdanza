<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Ateliê Verdanza</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles-global.css" />

  <style>
    :root {
      --cream: #f5f0e8;
      --warm-white: #faf7f2;
      --dark-green: #1e2c1a;
      --mid-green: #3a5435;
      --light-green: #6b8f5e;
      --text-dark: #2a2a22;
      --text-mid: #5a5a4a;
      --text-light: #8a8a7a;
      --border: #d8d0c0;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .login-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      animation: cardIn 0.55s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .flower-ornament {
      position: absolute;
      top: -1px;
      right: -1px;
      width: 64px;
      height: 64px;
      border: 1px solid var(--border);
      border-top-right-radius: 12px;
      border-bottom-left-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .flower-ornament svg {
      width: 36px;
      height: 36px;
      color: var(--text-light);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
      padding-right: 32px;
    }

    .login-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 400;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .login-header p {
      font-size: 0.8rem;
      color: var(--text-light);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-mid);
    }

    .forgot-link {
      font-size: 0.72rem;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: var(--dark-green);
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      font-family: 'Jost', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--text-dark);
      background: transparent;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-bottom-color: var(--dark-green);
    }

    input::placeholder {
      color: var(--border);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--dark-green);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.25s, transform 0.15s;
    }

    .btn-primary:hover {
      background: var(--mid-green);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .security-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 0.72rem;
      color: var(--text-light);
    }

    .security-note svg {
      color: var(--text-light);
    }

    .card-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    .register-section {
      text-align: center;
    }

    .register-section p {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-bottom: 14px;
    }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--text-dark);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--dark-green);
      background: var(--cream);
    }

    .error-msg {
      font-size: 0.75rem;
      color: #c0392b;
      margin-top: 6px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    footer {
      border-top: 1px solid var(--border);
    }

    .footer-links-bar {
      padding: 20px 48px;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 0 48px;
      align-items: center;
    }

    .footer-brand-small {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-dark);
    }

    .footer-brand-small small {
      display: block;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      color: var(--text-light);
      font-weight: 300;
      margin-top: 2px;
    }

    .footer-col-sm h4 {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .footer-col-sm ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .footer-col-sm ul li a {
      font-size: 0.77rem;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-col-sm ul li a:hover {
      color: var(--text-dark);
    }

    .footer-bottom {
      border-top: 1px solid var(--border);
      padding: 14px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-bottom p {
      font-size: 0.7rem;
      color: var(--text-light);
    }

    .footer-bottom-icons {
      display: flex;
      gap: 12px;
    }

    .footer-bottom-icons a {
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-bottom-icons a:hover {
      color: var(--text-dark);
    }

    @media (max-width: 680px) {
      nav {
        padding: 0 20px;
      }

      .login-card {
        padding: 36px 24px 32px;
      }

      .footer-links-bar {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 24px 20px;
      }

      .footer-bottom {
        padding: 12px 20px;
      }
    }
  </style>
</head>

<body>

  <nav></nav>

  <main>
    <div class="login-card">

      <div class="flower-ornament" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="24" cy="14" rx="5" ry="9" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(0 24 24)" />
          <ellipse cx="24" cy="14" rx="5" ry="9" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(60 24 24)" />
          <ellipse cx="24" cy="14" rx="5" ry="9" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(120 24 24)" />
          <ellipse cx="24" cy="14" rx="5" ry="9" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(180 24 24)" />
          <ellipse cx="24" cy="14" rx="5" ry="9" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(240 24 24)" />
          <ellipse cx="24" cy="14" rx="5" ry="9" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(300 24 24)" />
          <circle cx="24" cy="24" r="4" fill="none" stroke="currentColor" stroke-width="1.5" />
        </svg>
      </div>

      <div class="login-header">
        <h1>Bem-vindo de volta</h1>
        <p>Acesse sua conta</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">E-MAIL</label>
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
          <p class="error-msg" id="email-error">Por favor, insira um e-mail válido.</p>
        </div>

        <div class="form-group">
          <div class="form-row">
            <label for="password">SENHA</label>
            <a href="#" class="forgot-link">Esqueci minha senha</a>
          </div>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <p class="error-msg" id="password-error">A senha deve ter pelo menos 6 caracteres.</p>
        </div>

        <button type="submit" class="btn-primary" id="login-btn">Entrar</button>
      </form>

      <p class="security-note">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Autenticação Segura de 256 bits
      </p>

      <hr class="card-divider" />

      <div class="register-section">
        <p>Ainda não possui uma conta?</p>
        <button class="btn-secondary" onclick="window.location.href='cadastro.html'">Cadastrar</button>
      </div>

    </div>
  </main>

  <footer></footer>

  <script src="components.js"></script>
  <script src="js/api.js"></script>

  <script>
    const loginForm = document.getElementById("login-form");
    const loginButton = document.getElementById("login-btn");

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Preencha todos os campos.");
        return;
      }

      try {
        loginButton.classList.add("loading");
        loginButton.textContent = "Entrando...";

        const data = await apiRequest("/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        console.log("Resposta do login:", data);

        if (data.user && data.user.is_admin === true) {
          alert("Login de administrador realizado com sucesso!");
          window.location.href = "admin.html";
        } else {
          alert("Login realizado com sucesso!");
          window.location.href = "index.html";
        }

      } catch (error) {
        alert("Erro no login: " + error.message);
      } finally {
        loginButton.classList.remove("loading");
        loginButton.textContent = "Entrar";
      }
    });
  </script>

</body>
</html>
